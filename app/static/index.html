<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Telco-RCA</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #161013;
        color: #f3e8df;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        max-width: 42rem;
        padding: 2rem;
        border: 1px solid rgba(243, 232, 223, 0.12);
        border-radius: 1.25rem;
        background: rgba(38, 23, 24, 0.92);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
      }

      h1 {
        margin-top: 0;
      }

      code {
        padding: 0.1rem 0.35rem;
        border-radius: 0.35rem;
        background: rgba(243, 232, 223, 0.08);
      }

  </head>

    <div id="root"></div>
