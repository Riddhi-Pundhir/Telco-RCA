<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Telco-RCA incident cascade</title>
  <desc id="desc">A telecom outage flow showing a power failure cascading through core switches, radio controllers, and cell towers with increasing alarm noise.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a0f12"/>
      <stop offset="45%" stop-color="#3a1217"/>
      <stop offset="100%" stop-color="#5b2a2d"/>
    </linearGradient>
    <linearGradient id="arrowLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f1b08b"/>
      <stop offset="100%" stop-color="#d8d1c2"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#f2d8c4" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#f2d8c4" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#120608" flood-opacity="0.45"/>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="dots" width="42" height="42" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="1.4" fill="#f3e8d7" opacity="0.12"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d8d1c2"/>
    </marker>
    <style>
      .title { font: 700 48px/1.1 Inter, ui-sans-serif, system-ui, sans-serif; fill: #f3e8d7; letter-spacing: 0.02em; }
      .subtitle { font: 400 22px/1.4 Inter, ui-sans-serif, system-ui, sans-serif; fill: #f3e8d7; opacity: 0.88; }
      .section { font: 700 16px/1 Inter, ui-sans-serif, system-ui, sans-serif; letter-spacing: 0.35em; fill: #d8d1c2; opacity: 0.72; }
      .cardLabel { font: 700 19px/1.2 Inter, ui-sans-serif, system-ui, sans-serif; fill: #f3e8d7; letter-spacing: 0.12em; }
      .cardTitle { font: 700 31px/1.1 Fraunces, Georgia, serif; fill: #f7f1e6; }
      .cardBody { font: 400 18px/1.4 Inter, ui-sans-serif, system-ui, sans-serif; fill: #eadfcd; opacity: 0.92; }
      .chip { font: 700 15px/1 Inter, ui-sans-serif, system-ui, sans-serif; letter-spacing: 0.18em; fill: #f2e6d7; }
      .note { font: 500 14px/1 Inter, ui-sans-serif, system-ui, sans-serif; fill: #eadfcd; opacity: 0.7; }
      .legend { font: 600 16px/1 Inter, ui-sans-serif, system-ui, sans-serif; fill: #f3e8d7; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#dots)" opacity="0.5"/>
  <ellipse cx="430" cy="320" rx="330" ry="220" fill="url(#glow)"/>
  <ellipse cx="1110" cy="420" rx="350" ry="250" fill="url(#glow)" opacity="0.7"/>

  <g opacity="0.9">
    <rect x="62" y="58" width="320" height="42" rx="21" fill="#ffffff" fill-opacity="0.05" stroke="#f3e8d7" stroke-opacity="0.14"/>
    <text x="88" y="87" class="section">INCIDENT STORY</text>
  </g>

  <text x="64" y="170" class="title">One hidden fault can trigger a network-wide storm.</text>
  <text x="64" y="214" class="subtitle">Telco-RCA turns outage diagnosis into a graph reasoning problem: follow the cascade, ignore the noise, and repair the real cause.</text>

  <g filter="url(#shadow)">
    <rect x="52" y="260" width="1496" height="470" rx="34" fill="#ffffff" fill-opacity="0.04" stroke="#f3e8d7" stroke-opacity="0.14" stroke-width="2"/>
  </g>

  <text x="86" y="308" class="section">CASCADE FLOW</text>
  <text x="1310" y="308" class="note">alarm noise grows outward</text>

  <g filter="url(#shadow)">
    <rect x="96" y="365" width="260" height="220" rx="28" fill="#4b1f23" stroke="#e3c9ae" stroke-opacity="0.28" stroke-width="2"/>
    <rect x="426" y="365" width="260" height="220" rx="28" fill="#4b1f23" stroke="#e3c9ae" stroke-opacity="0.28" stroke-width="2"/>
    <rect x="756" y="365" width="260" height="220" rx="28" fill="#4b1f23" stroke="#e3c9ae" stroke-opacity="0.28" stroke-width="2"/>
    <rect x="1086" y="365" width="260" height="220" rx="28" fill="#4b1f23" stroke="#e3c9ae" stroke-opacity="0.28" stroke-width="2"/>
  </g>

  <g filter="url(#softGlow)">
    <line x1="356" y1="475" x2="426" y2="475" stroke="url(#arrowLine)" stroke-width="6" marker-end="url(#arrow)"/>
    <line x1="686" y1="475" x2="756" y2="475" stroke="url(#arrowLine)" stroke-width="6" marker-end="url(#arrow)"/>
    <line x1="1016" y1="475" x2="1086" y2="475" stroke="url(#arrowLine)" stroke-width="6" marker-end="url(#arrow)"/>
  </g>

  <g filter="url(#softGlow)">
    <path d="M 225 350 C 225 310, 350 310, 350 350" fill="none" stroke="#f2c9a0" stroke-width="4" opacity="0.65"/>
    <path d="M 555 350 C 555 310, 680 310, 680 350" fill="none" stroke="#f2c9a0" stroke-width="4" opacity="0.65"/>
    <path d="M 885 350 C 885 310, 1010 310, 1010 350" fill="none" stroke="#f2c9a0" stroke-width="4" opacity="0.65"/>
  </g>

  <g>
    <text x="124" y="395" class="cardLabel">TASK 1</text>
    <text x="124" y="448" class="cardTitle">Power Unit</text>
    <text x="124" y="487" class="cardBody">Hidden root fault</text>
    <rect x="124" y="526" width="112" height="34" rx="17" fill="#ef4444" fill-opacity="0.18" stroke="#ef4444" stroke-opacity="0.55"/>
    <text x="148" y="548" class="chip">FAILED</text>
  </g>

  <g>
    <text x="454" y="395" class="cardLabel">TASK 2</text>
    <text x="454" y="448" class="cardTitle">Core Switch</text>
    <text x="454" y="487" class="cardBody">Alarm clusters appear</text>
    <rect x="454" y="526" width="128" height="34" rx="17" fill="#f59e0b" fill-opacity="0.14" stroke="#f59e0b" stroke-opacity="0.55"/>
    <text x="479" y="548" class="chip">ALARMS</text>
  </g>

  <g>
    <text x="784" y="395" class="cardLabel">TASK 3</text>
    <text x="784" y="448" class="cardTitle">Radio Controller</text>
    <text x="784" y="487" class="cardBody">Noise and decoys</text>
    <rect x="784" y="526" width="132" height="34" rx="17" fill="#d8d1c2" fill-opacity="0.12" stroke="#d8d1c2" stroke-opacity="0.45"/>
    <text x="810" y="548" class="chip">MISLEADING</text>
  </g>

  <g>
    <text x="1114" y="395" class="cardLabel">TASK 4</text>
    <text x="1114" y="448" class="cardTitle">Cell Tower</text>
    <text x="1114" y="487" class="cardBody">Visible symptoms</text>
    <rect x="1114" y="526" width="138" height="34" rx="17" fill="#f3e8d7" fill-opacity="0.10" stroke="#f3e8d7" stroke-opacity="0.4"/>
    <text x="1137" y="548" class="chip">DOWNSTREAM</text>
  </g>

  <g opacity="0.9">
    <circle cx="1410" cy="382" r="10" fill="#f59e0b" opacity="0.9"/>
    <circle cx="1450" cy="430" r="6" fill="#d8d1c2" opacity="0.8"/>
    <circle cx="1398" cy="516" r="7" fill="#f3e8d7" opacity="0.85"/>
    <circle cx="1468" cy="560" r="8" fill="#ef4444" opacity="0.8"/>
    <circle cx="1375" cy="610" r="5" fill="#d8d1c2" opacity="0.55"/>
  </g>

  <g transform="translate(96 640)">
    <rect width="1408" height="62" rx="20" fill="#ffffff" fill-opacity="0.05" stroke="#f3e8d7" stroke-opacity="0.12"/>
    <g transform="translate(28 20)">
      <circle cx="10" cy="10" r="10" fill="#ef4444"/>
      <text x="32" y="15" class="legend">Root cause</text>
    </g>
    <g transform="translate(250 20)">
      <circle cx="10" cy="10" r="10" fill="#f59e0b"/>
      <text x="32" y="15" class="legend">Alarm clusters</text>
    </g>
    <g transform="translate(508 20)">
      <circle cx="10" cy="10" r="10" fill="#d8d1c2"/>
      <text x="32" y="15" class="legend">Noisy symptoms</text>
    </g>
    <g transform="translate(790 20)">
      <circle cx="10" cy="10" r="10" fill="#f3e8d7"/>
      <text x="32" y="15" class="legend">Visible graph evidence</text>
    </g>
  </g>
</svg>
